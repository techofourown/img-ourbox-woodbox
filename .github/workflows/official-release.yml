name: Official Release Build & Publish (Woodbox)

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

concurrency:
  group: official-release-woodbox-${{ github.event.release.tag_name || github.run_id }}
  cancel-in-progress: false

jobs:
  build-publish:
    if: startsWith(github.event.release.tag_name, 'v') && !github.event.release.draft
    runs-on: [self-hosted, official-heavy, x86-image]
    timeout-minutes: 120

    steps:
      - name: Fix workspace ownership from previous build
        run: sudo chown -R "$(id -u):$(id -g)" "${GITHUB_WORKSPACE}" 2>/dev/null || true

      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ github.event.release.tag_name }}
          fetch-depth: 0
          fetch-tags: true

      - name: Set release version
        run: echo "OURBOX_VERSION=${{ github.event.release.tag_name }}" >> "${GITHUB_ENV}"

      - name: Bootstrap host dependencies
        run: sudo ./tools/bootstrap-host.sh

      - name: Install installer smoke dependencies
        run: |
          if command -v qemu-system-x86_64 >/dev/null 2>&1 \
            && command -v qemu-img >/dev/null 2>&1 \
            && command -v sshpass >/dev/null 2>&1 \
            && command -v nc >/dev/null 2>&1; then
            exit 0
          fi
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends qemu-system-x86 qemu-utils sshpass netcat-openbsd

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Clean stale workspace artifacts
        run: |
          rm -rf artifacts/ deploy/
          rm -rf installer/ourbox/rootfs/opt/ourbox/airgap/platform/manifests
          rm -rf installer/ourbox/rootfs/opt/ourbox/airgap/platform/landing
          rm -rf installer/ourbox/rootfs/opt/ourbox/airgap/platform/todo-bloom

      - name: Preflight build host
        run: ./tools/preflight-build-host.sh

      - name: Fetch pinned upstream inputs
        run: ./tools/fetch-airgap-platform.sh

      - name: Build OS payload
        run: ./tools/build-os-payload.sh
        env:
          OURBOX_TARGET: x86
          OURBOX_VARIANT: prod

      - name: Prepare installer smoke key
        run: |
          KEY_DIR="${RUNNER_TEMP}/installer-smoke-key"
          KEY_FILE="${KEY_DIR}/id_ed25519"
          mkdir -p "${KEY_DIR}"
          rm -f "${KEY_FILE}" "${KEY_FILE}.pub"
          ssh-keygen -q -t ed25519 -N '' -f "${KEY_FILE}"
          printf 'OURBOX_INSTALLER_SMOKE_KEY=%s\n' "${KEY_FILE}" >> "${GITHUB_ENV}"
          {
            echo 'OURBOX_INSTALLER_SMOKE_PUBLIC_KEY<<EOF'
            cat "${KEY_FILE}.pub"
            echo 'EOF'
          } >> "${GITHUB_ENV}"

      - name: Build installer ISO (smoke)
        run: ./tools/build-installer-iso.sh
        env:
          OURBOX_TARGET: x86
          OURBOX_VARIANT: prod
          OURBOX_VERSION: ${{ env.OURBOX_VERSION }}-smoke
          OURBOX_INSTALLER_SSH_MODE: both
          OURBOX_INSTALLER_SSH_PASSWORD_HASH: ""
          OURBOX_INSTALLER_SSH_AUTHORIZED_KEYS: ${{ env.OURBOX_INSTALLER_SMOKE_PUBLIC_KEY }}
          OURBOX_INSTALLER_SSH_ALLOW_ROOT: "0"
          OURBOX_INSTALLER_MONITOR_BROADCAST_ADDR: 10.0.2.2
          OURBOX_INSTALLER_MONITOR_BROADCAST_PORT: "19999"

      - name: Boot installer ISO smoke test
        run: |
          set -euo pipefail
          ISO="$(ls -1t deploy/installer-ourbox-woodbox-x86-*-smoke.iso 2>/dev/null | head -n1 || true)"
          if [[ -z "${ISO}" ]]; then
            echo "ERROR: smoke installer ISO not found" >&2
            exit 1
          fi
          ./tools/check-installer-boot-smoke.sh "${ISO}"
        env:
          OURBOX_INSTALLER_SSH_KEY: ${{ env.OURBOX_INSTALLER_SMOKE_KEY }}
          OURBOX_INSTALLER_SSH_PASSWORD_STATE: generated-console-only
          OURBOX_INSTALLER_SSH_MODE: both
          OURBOX_INSTALLER_SSH_ALLOW_ROOT: "0"
          VM_UDP_PORT: "19999"

      - name: Build installer ISO
        run: ./tools/build-installer-iso.sh
        env:
          OURBOX_TARGET: x86
          OURBOX_VARIANT: prod
          OURBOX_INSTALLER_SSH_MODE: both
          OURBOX_INSTALLER_SSH_PASSWORD_HASH: ""
          OURBOX_INSTALLER_SSH_ALLOW_ROOT: "0"

      - name: Publish OS artifact (official release)
        run: ./tools/publish-os-artifact-official.sh release
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}

      - name: Publish installer artifact (official release)
        run: ./tools/publish-installer-artifact-official.sh release
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}

      - name: Upload provenance outputs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: provenance-release-${{ github.event.release.tag_name }}
          path: |
            deploy/os-artifact.ref
            deploy/os-artifact.pinned.ref
            deploy/os-artifact.digest
            deploy/installer-artifact.ref
            deploy/installer-artifact.pinned.ref
            deploy/installer-artifact.digest
          if-no-files-found: warn
