name: Official Nightly Build & Publish (Woodbox)

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - 'CLAUDE.md'

permissions:
  contents: read
  packages: write

concurrency:
  group: official-nightly-woodbox
  cancel-in-progress: false

jobs:
  build-publish:
    runs-on: [self-hosted, official-heavy, x86-image]
    timeout-minutes: 120

    steps:
      - name: Fix workspace ownership from previous build
        run: sudo chown -R "$(id -u):$(id -g)" "${GITHUB_WORKSPACE}" 2>/dev/null || true

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set nightly version
        run: echo "OURBOX_VERSION=nightly-${GITHUB_SHA:0:12}" >> "${GITHUB_ENV}"

      - name: Bootstrap host dependencies
        run: sudo ./tools/bootstrap-host.sh

      - name: Install installer smoke dependencies
        run: |
          if command -v qemu-system-x86_64 >/dev/null 2>&1 \
            && command -v qemu-img >/dev/null 2>&1 \
            && command -v sshpass >/dev/null 2>&1 \
            && command -v nc >/dev/null 2>&1; then
            exit 0
          fi
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends qemu-system-x86 qemu-utils sshpass netcat-openbsd

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Resolve latest nightly upstream inputs
        run: |
          set -euo pipefail
          echo "OURBOX_PLATFORM_CONTRACT_REF=ghcr.io/techofourown/sw-ourbox-os/platform-contract@$(oras resolve ghcr.io/techofourown/sw-ourbox-os/platform-contract:edge)" >> "${GITHUB_ENV}"
          echo "OURBOX_AIRGAP_PLATFORM_REF=ghcr.io/techofourown/sw-ourbox-os/airgap-platform@$(oras resolve ghcr.io/techofourown/sw-ourbox-os/airgap-platform:edge-amd64)" >> "${GITHUB_ENV}"

      - name: Clean stale workspace artifacts
        run: |
          rm -rf artifacts/ deploy/
          rm -rf installer/ourbox/rootfs/opt/ourbox/airgap/platform/manifests
          rm -rf installer/ourbox/rootfs/opt/ourbox/airgap/platform/landing
          rm -rf installer/ourbox/rootfs/opt/ourbox/airgap/platform/todo-bloom

      - name: Preflight build host
        run: ./tools/preflight-build-host.sh

      - name: Fetch pinned upstream inputs
        run: ./tools/fetch-airgap-platform.sh

      - name: Build OS payload
        run: ./tools/build-os-payload.sh
        env:
          OURBOX_TARGET: x86
          OURBOX_VARIANT: prod

      - name: Publish OS artifact (official nightly)
        run: ./tools/publish-os-artifact-official.sh nightly

      - name: Resolve installer default OS ref
        run: |
          set -euo pipefail
          echo "OS_DEFAULT_REF=$(cat deploy/os-artifact.pinned.ref)" >> "${GITHUB_ENV}"

      - name: Build installer ISO
        run: ./tools/build-installer-iso.sh
        env:
          OURBOX_TARGET: x86
          OURBOX_VARIANT: prod
          OS_CHANNEL: nightly
          OS_DEFAULT_REF: ${{ env.OS_DEFAULT_REF }}
          INSTALL_DEFAULTS_REF: ""
          OURBOX_INSTALLER_SSH_MODE: both
          OURBOX_INSTALLER_SSH_PASSWORD_HASH: ""
          OURBOX_INSTALLER_SSH_ALLOW_ROOT: "0"

      - name: Smoke check baked installer defaults
        run: ./tools/check-installer-defaults-smoke.sh
        env:
          OURBOX_TARGET: x86
          EXPECTED_OS_DEFAULT_REF: ${{ env.OS_DEFAULT_REF }}

      - name: Publish installer artifact (official nightly)
        run: ./tools/publish-installer-artifact-official.sh nightly

      - name: Upload provenance outputs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: provenance-nightly-${{ github.sha }}
          path: |
            deploy/os-artifact.ref
            deploy/os-artifact.pinned.ref
            deploy/os-artifact.digest
            deploy/installer-artifact.ref
            deploy/installer-artifact.pinned.ref
            deploy/installer-artifact.digest
            deploy/installer-defaults.extracted.env
            deploy/installer-defaults-smoke.txt
          if-no-files-found: warn
