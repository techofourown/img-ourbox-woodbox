name: Revalidate Woodbox Build (non-publishing)
# Runs the full Woodbox OS payload + installer ISO build on the official builder
# to confirm the release-capable path still works. Does NOT publish any artifacts.
# Use this after infrastructure changes, runner migrations, or to satisfy the
# ADR-0008 revalidation requirement.
#
# For an actual official republish, touch release/REVALIDATION_TRIGGER in a PR instead.

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * 0'   # Weekly, Sunday 04:00 UTC

permissions:
  contents: read

concurrency:
  group: revalidate-woodbox
  cancel-in-progress: false

jobs:
  revalidate:
    runs-on: [self-hosted, official-heavy, x86-image]
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set revalidation version label
        run: echo "OURBOX_VERSION=revalidation-${GITHUB_SHA:0:12}" >> "${GITHUB_ENV}"

      - name: Login to GHCR (for fetching upstream inputs)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Bootstrap host dependencies
        run: sudo ./tools/bootstrap-host.sh

      - name: Install installer smoke dependencies
        run: |
          if command -v qemu-system-x86_64 >/dev/null 2>&1 \
            && command -v qemu-img >/dev/null 2>&1 \
            && command -v sshpass >/dev/null 2>&1 \
            && command -v nc >/dev/null 2>&1; then
            exit 0
          fi
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends qemu-system-x86 qemu-utils sshpass netcat-openbsd

      - name: Preflight build host
        run: ./tools/preflight-build-host.sh

      - name: Fetch pinned upstream inputs
        run: ./tools/fetch-airgap-platform.sh

      - name: Build OS payload
        run: ./tools/build-os-payload.sh
        env:
          OURBOX_TARGET: x86
          OURBOX_VARIANT: prod

      - name: Prepare installer smoke key
        run: |
          KEY_DIR="${RUNNER_TEMP}/installer-smoke-key"
          KEY_FILE="${KEY_DIR}/id_ed25519"
          mkdir -p "${KEY_DIR}"
          rm -f "${KEY_FILE}" "${KEY_FILE}.pub"
          ssh-keygen -q -t ed25519 -N '' -f "${KEY_FILE}"
          printf 'OURBOX_INSTALLER_SMOKE_KEY=%s\n' "${KEY_FILE}" >> "${GITHUB_ENV}"
          {
            echo 'OURBOX_INSTALLER_SMOKE_PUBLIC_KEY<<EOF'
            cat "${KEY_FILE}.pub"
            echo 'EOF'
          } >> "${GITHUB_ENV}"

      - name: Prepare installer smoke password
        run: |
          SMOKE_PASS='ourbox-smoke-pass'
          SMOKE_HASH="$(printf '%s' "${SMOKE_PASS}" | openssl passwd -6 -stdin -salt smoke-ci)"
          printf 'OURBOX_INSTALLER_SMOKE_PASSWORD=%s\n' "${SMOKE_PASS}" >> "${GITHUB_ENV}"
          printf 'OURBOX_INSTALLER_SMOKE_PASSWORD_HASH=%s\n' "${SMOKE_HASH}" >> "${GITHUB_ENV}"

      - name: Build installer ISO (smoke)
        run: ./tools/build-installer-iso.sh
        env:
          OURBOX_TARGET: x86
          OURBOX_VARIANT: prod
          OURBOX_VERSION: ${{ env.OURBOX_VERSION }}-smoke
          OURBOX_INSTALLER_SSH_MODE: both
          OURBOX_INSTALLER_SSH_PASSWORD_HASH: ${{ env.OURBOX_INSTALLER_SMOKE_PASSWORD_HASH }}
          OURBOX_INSTALLER_SSH_AUTHORIZED_KEYS: ${{ env.OURBOX_INSTALLER_SMOKE_PUBLIC_KEY }}
          OURBOX_INSTALLER_SSH_ALLOW_ROOT: "0"
          OURBOX_INSTALLER_SMOKE_CONSOLE: "1"
          OURBOX_INSTALLER_MONITOR_BROADCAST_ADDR: 10.0.2.2
          OURBOX_INSTALLER_MONITOR_BROADCAST_PORT: "19999"

      - name: Boot installer ISO smoke test
        run: |
          set -euo pipefail
          ISO="$(ls -1t deploy/installer-ourbox-woodbox-x86-*-smoke.iso 2>/dev/null | head -n1 || true)"
          if [[ -z "${ISO}" ]]; then
            echo "ERROR: smoke installer ISO not found" >&2
            exit 1
          fi
          bash ./tools/check-installer-boot-smoke.sh "${ISO}"
        env:
          OURBOX_INSTALLER_SSH_KEY: ${{ env.OURBOX_INSTALLER_SMOKE_KEY }}
          OURBOX_INSTALLER_SSH_PASSWORD: ${{ env.OURBOX_INSTALLER_SMOKE_PASSWORD }}
          OURBOX_INSTALLER_SSH_PASSWORD_STATE: configured-hash
          OURBOX_INSTALLER_SSH_MODE: both
          OURBOX_INSTALLER_SSH_ALLOW_ROOT: "0"
          VM_UDP_PORT: "19999"
          OURBOX_SMOKE_ARTIFACT_DIR: deploy/smoke-diag

      - name: Build installer ISO
        run: ./tools/build-installer-iso.sh
        env:
          OURBOX_TARGET: x86
          OURBOX_VARIANT: prod
          OURBOX_INSTALLER_SSH_MODE: both
          OURBOX_INSTALLER_SSH_PASSWORD_HASH: ""
          OURBOX_INSTALLER_SSH_ALLOW_ROOT: "0"

      - name: Verify build outputs exist
        run: |
          set -euo pipefail
          TAR="$(ls -1t deploy/os-payload-ourbox-woodbox-x86-*.tar.gz 2>/dev/null | head -n1 || true)"
          if [[ -z "${TAR}" ]]; then
            echo "ERROR: no deploy/os-payload-ourbox-woodbox-x86-*.tar.gz found" >&2
            exit 1
          fi
          echo "OS payload: ${TAR} ($(du -h "${TAR}" | cut -f1))"
          ISO="$(ls -1t deploy/installer-ourbox-woodbox-x86-*.iso 2>/dev/null | head -n1 || true)"
          if [[ -z "${ISO}" ]]; then
            echo "ERROR: no deploy/installer-ourbox-woodbox-x86-*.iso found" >&2
            exit 1
          fi
          echo "Installer ISO: ${ISO} ($(du -h "${ISO}" | cut -f1))"
          echo "Revalidation build verified."

      - name: Upload revalidation smoke diagnostics
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: revalidation-woodbox-smoke-diag-${{ github.run_id }}
          path: |
            deploy/smoke-diag/**
          if-no-files-found: warn

      - name: Upload revalidation metadata
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: revalidation-woodbox-${{ github.run_id }}
          path: |
            deploy/*.sha256
          if-no-files-found: warn
