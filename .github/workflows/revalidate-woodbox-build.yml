name: Revalidate Woodbox Build (non-publishing)
# Runs the full Woodbox OS payload + installer ISO build on the official builder
# to confirm the release-capable path still works. Does NOT publish any artifacts.
# Use this after infrastructure changes, runner migrations, or to satisfy the
# ADR-0008 revalidation requirement.
#
# For an actual official republish, touch release/REVALIDATION_TRIGGER in a PR instead.

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * 0'   # Weekly, Sunday 04:00 UTC

permissions:
  contents: read

concurrency:
  group: revalidate-woodbox
  cancel-in-progress: false

jobs:
  revalidate:
    runs-on: [self-hosted, official-heavy, x86-image]
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set revalidation version label
        run: echo "OURBOX_VERSION=revalidation-${GITHUB_SHA:0:12}" >> "${GITHUB_ENV}"

      - name: Login to GHCR (for fetching upstream inputs)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Bootstrap host dependencies
        run: sudo ./tools/bootstrap-host.sh

      - name: Preflight build host
        run: ./tools/preflight-build-host.sh

      - name: Fetch pinned upstream inputs
        run: ./tools/fetch-airgap-platform.sh

      - name: Build OS payload
        run: ./tools/build-os-payload.sh
        env:
          OURBOX_TARGET: x86
          OURBOX_VARIANT: prod

      - name: Build installer ISO
        run: ./tools/build-installer-iso.sh
        env:
          OURBOX_TARGET: x86
          OURBOX_VARIANT: prod

      - name: Verify build outputs exist
        run: |
          set -euo pipefail
          TAR="$(ls -1t deploy/os-payload-ourbox-woodbox-x86-*.tar.gz 2>/dev/null | head -n1 || true)"
          if [[ -z "${TAR}" ]]; then
            echo "ERROR: no deploy/os-payload-ourbox-woodbox-x86-*.tar.gz found" >&2
            exit 1
          fi
          echo "OS payload: ${TAR} ($(du -h "${TAR}" | cut -f1))"
          ISO="$(ls -1t deploy/installer-ourbox-woodbox-x86-*.iso 2>/dev/null | head -n1 || true)"
          if [[ -z "${ISO}" ]]; then
            echo "ERROR: no deploy/installer-ourbox-woodbox-x86-*.iso found" >&2
            exit 1
          fi
          echo "Installer ISO: ${ISO} ($(du -h "${ISO}" | cut -f1))"
          echo "Revalidation build verified."

      - name: Upload revalidation metadata
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: revalidation-woodbox-${{ github.run_id }}
          path: |
            deploy/*.sha256
          if-no-files-found: warn
