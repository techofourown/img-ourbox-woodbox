name: Smoke Build — Installer (Self-hosted, non-publishing)
# Manual build-only workflow for on-demand verification that an installer ISO
# build succeeds on a real x86 build host. Does NOT publish to GHCR.
# Official publication is done by official-nightly.yml and official-release.yml.

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Build target (for example x86)"
        required: true
        default: "x86"
        type: string
      variant:
        description: "Variant label (for example prod/dev)"
        required: true
        default: "prod"
        type: string
      version:
        description: "Version label embedded in metadata"
        required: true
        default: "dev"
        type: string

permissions:
  contents: read
  packages: read

concurrency:
  group: smoke-build-installer-${{ inputs.target }}-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  smoke-build:
    runs-on: [self-hosted, ourbox-builder, x86-build]
    timeout-minutes: 120
    env:
      OURBOX_TARGET: ${{ inputs.target }}
      OURBOX_VARIANT: ${{ inputs.variant }}
      OURBOX_VERSION: ${{ inputs.version }}
      OURBOX_INSTALLER_SSH_MODE: both
      OURBOX_INSTALLER_SSH_PASSWORD_HASH: ""
      OURBOX_INSTALLER_SSH_ALLOW_ROOT: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bootstrap host dependencies
        run: sudo ./tools/bootstrap-host.sh

      - name: Build installer ISO
        run: ./tools/build-installer-iso.sh

      - name: Verify build output exists
        run: |
          set -euo pipefail
          ISO="$(ls -1t deploy/installer-ourbox-woodbox-"${OURBOX_TARGET,,}"-*.iso 2>/dev/null | head -n1 || true)"
          if [[ -z "${ISO}" ]]; then
            echo "ERROR: no deploy/installer-ourbox-woodbox-${OURBOX_TARGET,,}-*.iso found" >&2
            exit 1
          fi
          echo "Installer ISO: ${ISO} ($(du -h "${ISO}" | cut -f1))"

      - name: Upload build outputs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-installer-build-${{ github.run_id }}
          path: |
            deploy/*installer-ourbox-woodbox-*.sha256
            deploy/installer-artifact.digest
          if-no-files-found: warn
